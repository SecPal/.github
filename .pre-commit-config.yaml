# Pre-commit hooks for quality checks
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

repos:
  # REUSE compliance
  - repo: https://github.com/fsfe/reuse-tool
    rev: v5.0.2
    hooks:
      - id: reuse

  # Code formatting
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        entry: bash -c 'npx --yes prettier@3.5.3 --write "$@"' --
        language: system
        types_or: [markdown, yaml, json, javascript]
        exclude: 'package-lock\.json|composer\.lock|yarn\.lock|pnpm-lock\.yaml'

  # Markdown linting
  - repo: local
    hooks:
      - id: markdownlint
        name: markdownlint
        entry: bash -c 'npx --yes --package markdownlint-cli@0.49.0 markdownlint --config .markdownlint.json "$@"' --
        language: system
        types: [markdown]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yml"]

  # GitHub Actions workflow linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.4
    hooks:
      - id: actionlint

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # Git hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master", "--branch", "production"]
