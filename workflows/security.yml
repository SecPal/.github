name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run every Monday at 6:00 AM UTC
    - cron: '0 6 * * 1'

permissions:
  security-events: write
  contents: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'php']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: ['frontend', 'contracts']
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run npm audit
        working-directory: ./${{ matrix.directory }}
        run: |
          npm ci
          npm audit --audit-level=moderate

  composer-audit:
    name: Composer Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        working-directory: ./api
        run: composer install --prefer-dist --no-progress

      - name: Run composer audit
        working-directory: ./api
        run: composer audit

  actions-security:
    name: GitHub Actions Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for security issues in GitHub Actions
        run: |
          echo "Checking GitHub Actions workflows for security issues..."

          # Check for unpinned actions (should use commit SHA or specific version)
          echo "Checking for unpinned actions..."
          if grep -r -E "uses:.*@main$|uses:.*@master$" .github/workflows/ 2>/dev/null; then
            echo "⚠️  Error: Found actions using @main or @master branches"
            echo "Actions must be pinned to specific versions or commit SHAs for security"
            exit 1
          else
            echo "✅ No unpinned actions found"
          fi
