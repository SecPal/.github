name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release
            git log --pretty=format:"* %s (%h)" > CHANGELOG.txt
          else
            # Generate changelog since last tag
            git log ${PREV_TAG}..HEAD --pretty=format:"* %s (%h)" > CHANGELOG.txt
          fi

          echo "Generated changelog"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.txt
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-frontend:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Create frontend archive
        run: |
          cd frontend/dist
          tar -czf ../../secpal-frontend-${GITHUB_REF#refs/tags/}.tar.gz .

      - name: Upload frontend to release
        uses: softprops/action-gh-release@v2
        with:
          files: secpal-frontend-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-api:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Build API
        working-directory: ./api
        run: |
          composer install --no-dev --optimize-autoloader

      - name: Create API archive
        run: |
          tar -czf secpal-api-${GITHUB_REF#refs/tags/}.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='tests' \
            --exclude='storage/logs/*' \
            api/

      - name: Upload API to release
        uses: softprops/action-gh-release@v2
        with:
          files: secpal-api-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-api]
    steps:
      - name: Release notification
        run: |
          echo "Release ${GITHUB_REF#refs/tags/} created successfully!"
          echo "Assets uploaded:"
          echo "- Frontend build"
          echo "- API build"
