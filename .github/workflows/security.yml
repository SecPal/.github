name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1" # Weekly on Mondays at 6:00 AM UTC

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --production

  actions-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for security issues in GitHub Actions
        run: |
          set -euo pipefail
          echo "Checking GitHub Actions workflows for security issues..."

          # Check for unpinned actions (should use commit SHA or specific version)
          echo "Checking for unpinned actions..."
          if grep -r "uses:.*@main\|uses:.*@master" .github/workflows/ workflows/ 2>/dev/null; then
            echo "⚠️  Warning: Found actions using @main or @master branches"
            echo "Consider pinning to specific versions or commit SHAs"
          else
            echo "✅ No unpinned actions found"
          fi
