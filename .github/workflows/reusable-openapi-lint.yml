---
name: Reusable - OpenAPI Lint

on:
  workflow_call:
    inputs:
      openapi-file:
        description: "Path to OpenAPI specification file"
        required: false
        type: string
        default: "openapi.yaml"
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "22.x"
      require-lockfile:
        description: >-
          Fail if package-lock.json is missing when package.json exists
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  openapi-lint:
    name: Validate OpenAPI Specification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        env:
          REQUIRE_LOCKFILE: ${{ inputs.require-lockfile }}
        run: |
          set -euo pipefail
          if [ -f "package.json" ]; then
            if ! command -v jq >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y jq
            fi
            if [ -f "package-lock.json" ]; then
              npm ci
            elif [ "$REQUIRE_LOCKFILE" = "true" ]; then
              echo "::error::package-lock.json not found. Commit a lock file or disable require-lockfile." >&2
              exit 1
            else
              echo "::warning::No package-lock.json found. Using npm install instead of npm ci." >&2
              echo "::warning::Consider committing package-lock.json for reproducible builds." >&2
              npm install
            fi
          else
            npm install -g @redocly/cli
          fi

      - name: Validate OpenAPI specification
        env:
          OPENAPI_FILE: ${{ inputs.openapi-file }}
        run: |
          # Check if package.json has a lint script that we can use
          # Only use it if OPENAPI_FILE matches the default to avoid ignoring custom file paths
          if [ -f "package.json" ] && \
            command -v jq &> /dev/null && \
            jq -e '.scripts.lint' package.json > /dev/null 2>&1; then
            if [ "$OPENAPI_FILE" = "openapi.yaml" ] || [ "$OPENAPI_FILE" = "docs/openapi.yaml" ]; then
              npm run lint
            else
              echo "Warning: Skipping 'npm run lint' because OPENAPI_FILE ($OPENAPI_FILE) doesn't match default paths."
              echo "Falling back to direct redocly invocation."
              if [ -f ".redocly.yaml" ]; then
                npx redocly lint "$OPENAPI_FILE" --config .redocly.yaml
              elif [ -f ".redocly.yml" ]; then
                npx redocly lint "$OPENAPI_FILE" --config .redocly.yml
              else
                npx redocly lint "$OPENAPI_FILE"
              fi
            fi
          elif [ -f ".redocly.yaml" ]; then
            npx redocly lint "$OPENAPI_FILE" --config .redocly.yaml
          elif [ -f ".redocly.yml" ]; then
            npx redocly lint "$OPENAPI_FILE" --config .redocly.yml
          else
            npx redocly lint "$OPENAPI_FILE"
          fi
