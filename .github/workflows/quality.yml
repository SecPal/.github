---
# SPDX-FileCopyrightText: 2025-2026 SecPal
# SPDX-License-Identifier: AGPL-3.0-or-later

# Note: This workflow uses inline jobs instead of calling reusable workflows
# to avoid a chicken-and-egg problem: the reusable workflows are not yet
# available on the main branch until this PR is merged.
# Other repositories should use the reusable workflows via reviewed immutable
# refs such as:
#   uses: SecPal/.github/.github/workflows/reusable-prettier.yml@<trusted-commit-sha>
#   uses: SecPal/.github/.github/workflows/reusable-markdown-lint.yml@<trusted-commit-sha>

name: Code Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-review-workflow:
    name: Finite PR Review Workflow
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify finite workflow dependencies
        run: command -v rg >/dev/null

      - name: Run guarded-action unit tests
        run: python3 -m unittest tests/secpal-pr-review-actions-unit.py

      - name: Run finite skill policy tests
        run: bash tests/secpal-pr-review-skill-policy.sh

      - name: Run fake-GitHub and temporary-HOME integration tests
        run: bash tests/secpal-pr-review-skill-integration.sh

  prettier:
    name: Check Code Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22.x"

      - name: Install Node dependencies
        run: npm ci

      - name: Run Prettier Check
        run: npx prettier --check '**/*.{md,yml,yaml,json}'

  markdown-lint:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22.x"

      - name: Install Node dependencies
        run: npm ci

      - name: Run markdownlint
        run: >
          npx markdownlint --config .markdownlint.json --dot "**/*.md"
          --ignore node_modules --ignore vendor --ignore storage
          --ignore build --ignore .git
