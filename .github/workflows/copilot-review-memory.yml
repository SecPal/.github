name: Copilot Review Memory

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read

jobs:
  export-review-memory:
    name: Export Copilot review memory
    if: github.event_name != 'pull_request_review' || github.event.review.user.login == 'copilot-pull-request-reviewer'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: SecPal

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Export unresolved Copilot findings
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ./scripts/copilot-review-tool.sh scan \
            --repo SecPal/api \
            --repo SecPal/frontend \
            --repo SecPal/contracts \
            --repo SecPal/.github \
            --state unresolved \
            --output-dir artifacts/copilot-review-memory

      - name: Upload review memory artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-review-memory-${{ github.run_id }}
          path: artifacts/copilot-review-memory
          if-no-files-found: error

      - name: Publish workflow summary
        run: cat artifacts/copilot-review-memory/summary.md >> "$GITHUB_STEP_SUMMARY"
