name: Copilot Review Memory

on:
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  issues: write

jobs:
  export-review-memory:
    name: Export Copilot review memory
    if: github.event_name != 'pull_request_review' || github.event.review.user.login == 'copilot-pull-request-reviewer'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: SecPal

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Export unresolved Copilot findings
        id: scan
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ./scripts/copilot-review-tool.sh scan \
            --repo SecPal/api \
            --repo SecPal/frontend \
            --repo SecPal/contracts \
            --repo SecPal/.github \
            --state unresolved \
            --max-prs 25 \
            --output-dir artifacts/copilot-review-memory

          match_count=$(find artifacts/copilot-review-memory -name 'pr-*-threads.md' | wc -l | tr -d ' ')
          echo "match_count=$match_count" >> "$GITHUB_OUTPUT"

      - name: Persist recurring Copilot finding categories
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ./scripts/copilot-review-tool.sh track \
            --repo SecPal/.github \
            --input-dir artifacts/copilot-review-memory \
            --threshold 2 \
            --label enhancement \
            --label developer-experience \
            --label config-infrastructure \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --output artifacts/copilot-review-memory/tracking.md

      - name: Upload review memory artifact
        if: steps.scan.outputs.match_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: copilot-review-memory-${{ github.run_id }}
          path: artifacts/copilot-review-memory
          if-no-files-found: error

      - name: Publish workflow summary
        run: |
          cat artifacts/copilot-review-memory/summary.md >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          cat artifacts/copilot-review-memory/tracking.md >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.scan.outputs.match_count }}" = "0" ]; then
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "No unresolved Copilot review findings matched this run." >> "$GITHUB_STEP_SUMMARY"
          fi
