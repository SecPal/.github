name: Dependency Review

on:
  pull_request:
    branches: [main, develop]

# Note: Permissions are intentionally limited to 'read' for the calling workflow.
# The reusable workflow at SecPal/.github/.github/workflows/reusable-dependency-review.yml@main
# must declare any write permissions it needs, as permissions do not automatically inherit.
permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    uses: SecPal/.github/.github/workflows/reusable-dependency-review.yml@main
    with:
      skip-dependabot-workflow-only: false
