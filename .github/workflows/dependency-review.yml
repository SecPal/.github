name: Dependency Review

on:
  pull_request:
    branches: [main, develop]

# Note: Permissions are intentionally limited to 'read' for the calling workflow.
# The reusable workflow can inherit permissions granted by this calling workflow,
# which are intentionally restricted to 'read'. If the reusable workflow requires
# write permissions, it must explicitly request them.
permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    uses: SecPal/.github/.github/workflows/reusable-dependency-review.yml@main
    with:
      skip-dependabot-workflow-only: false
