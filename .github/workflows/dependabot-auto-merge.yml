---
# Dependabot Auto-Merge Workflow (.github repository)
# This is a caller workflow that uses the reusable workflow
#
# For implementation details, see:
# .github/workflows/reusable-dependabot-auto-merge.yml

name: Dependabot Auto-Merge

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

# Ensure only one auto-merge runs at a time per PR
concurrency:
  group: ${{ github.repository }}-dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-merge:
    # Gate on the PR author rather than the event actor so maintainer-triggered
    # `reopened` and `ready_for_review` events on Dependabot-authored PRs do not
    # skip auto-merge enrollment. See:
    # https://docs.github.com/en/code-security/dependabot/working-with-dependabot/automating-dependabot-with-github-actions#enable-auto-merge-on-a-pull-request
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    uses: SecPal/.github/.github/workflows/reusable-dependabot-auto-merge.yml@v1
    with:
      # Phase 1: Only PATCH updates auto-merge
      phase: "1"
      # Use squash merge for cleaner history
      merge-method: "squash"
