---
# SPDX-FileCopyrightText: 2025-2026 SecPal
# SPDX-License-Identifier: AGPL-3.0-or-later

name: License Compatibility

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  license-check:
    name: Check License Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install REUSE tool
        run: pip install reuse

      - name: Extract licenses
        run: |
          echo "Checking for AGPL-3.0-or-later compatibility..."
          reuse spdx -o reuse.spdx

      - name: Check AGPL compatibility
        run: |
          secpal_attribution_license_ref="LicenseRef-SecPal-Attribution"
          secpal_attribution_license_file="LICENSES/LicenseRef-SecPal-Attribution.txt"
          secpal_attribution_license_sha256="0483f138e65753a0c8a3ba718d8ca9bdcba8633be8262c346d17c3a0b711b638"
          tailwind_plus_license_ref="LicenseRef-TailwindPlus"
          tailwind_plus_license_file="LICENSES/LicenseRef-TailwindPlus.txt"
          tailwind_plus_license_sha256="f34dfb2ffa166cb60cf0aa4b9cedca33ab8caee1438ef81e14399e24bdadac3c"

          validate_custom_license_ref() {
            local license_ref="$1"
            local required_license="$2"
            local license_file="$3"
            local expected_sha256="$4"
            local reference_label="$5"
            local actual_sha256
            local matching_expressions
            local invalid_expressions

            if ! printf '%s\n' "$licenses" | grep -qxF "$license_ref"; then
              return
            fi

            if [ ! -f "$license_file" ]; then
              echo "ERROR: $license_ref requires $license_file"
              incompatible_found=1
            else
              actual_sha256="$(sha256sum "$license_file" | awk '{print $1}')"
              if [ "$actual_sha256" != "$expected_sha256" ]; then
                echo "ERROR: $license_ref must use the approved $reference_label text"
                incompatible_found=1
              fi
            fi

            matching_expressions="$(
              git grep -n "SPDX-License-Identifier.*$license_ref" -- . ':(exclude)LICENSES/*' || true
            )"
            if [ -z "$matching_expressions" ]; then
              echo "ERROR: $license_ref must appear in a tracked SPDX-License-Identifier expression"
              incompatible_found=1
              return
            fi

            invalid_expressions="$(
              printf '%s\n' "$matching_expressions" | awk -F: -v required="$required_license" '
                index($0, " OR ") || index($0, required) == 0 { print }
              '
            )"
            if [ -n "$invalid_expressions" ]; then
              echo "ERROR: $license_ref is only allowed with $required_license" \
                "in the same SPDX-License-Identifier expression:"
              printf '%s\n' "$invalid_expressions"
              incompatible_found=1
            fi
          }

          # Extract all licenses from the SPDX file
          licenses=$(grep "LicenseInfoInFile" reuse.spdx | cut -d':' -f2 | sort -u | tr -d ' ')

          echo "Found licenses: $licenses"

          # AGPL-3.0-or-later is compatible with:
          # - AGPL-3.0-or-later itself
          # - GPL-3.0-or-later (can be upgraded to AGPL)
          # - LGPL-3.0-or-later (can be upgraded to AGPL)
          # - MIT, BSD, Apache-2.0 (permissive licenses)
          # - CC0-1.0 (public domain)
          # - OFL-1.1 (SIL Open Font License: permits embedding in software/websites;
          #   font files remain under OFL but their use in AGPL projects is allowed)
          # - LicenseRef-TailwindPlus (Catalyst UI Kit: explicitly permits use in open source
          #   projects, components remain under original license but usage is allowed)
          # - LicenseRef-SecPal-Attribution (accepted only for files that declare
          #   the approved SecPal attribution addendum for AGPL-licensed SecPal
          #   repositories; this does not approve arbitrary attribution terms)

          compatible_licenses=(
            "AGPL-3.0-or-later"
            "GPL-3.0-or-later"
            "LGPL-3.0-or-later"
            "MIT"
            "BSD-2-Clause"
            "BSD-3-Clause"
            "Apache-2.0"
            "CC0-1.0"
            "ISC"
            "OFL-1.1"
            "ODbL-1.0"   # Open Database License: accepted for bundled geo-data,
                          # reference datasets, and similar data-only artifacts
                          # (e.g. OpenPLZ); appropriate file-level usage is a
                          # code-review concern - this check only verifies
                          # AGPL compatibility
            "LicenseRef-TailwindPlus"
            "LicenseRef-SecPal-Attribution"
          )

          incompatible_found=0
          for license in $licenses; do
            found=0
            for compatible in "${compatible_licenses[@]}"; do
              if [[ "$license" == "$compatible" ]]; then
                found=1
                break
              fi
            done
            if [ $found -eq 0 ]; then
              echo "ERROR: Incompatible license found: $license"
              incompatible_found=1
            fi
          done

          validate_custom_license_ref \
            "$tailwind_plus_license_ref" \
            "AGPL-3.0-or-later" \
            "$tailwind_plus_license_file" \
            "$tailwind_plus_license_sha256" \
            "Tailwind Plus license text"
          validate_custom_license_ref \
            "$secpal_attribution_license_ref" \
            "AGPL-3.0-or-later" \
            "$secpal_attribution_license_file" \
            "$secpal_attribution_license_sha256" \
            "SecPal attribution addendum text"

          if [ $incompatible_found -eq 1 ]; then
            echo "ERROR: Found licenses incompatible with AGPL-3.0-or-later"
            exit 1
          fi

          echo "All licenses are compatible with AGPL-3.0-or-later ✓"
