---
# SPDX-FileCopyrightText: 2025-2026 SecPal
# SPDX-License-Identifier: AGPL-3.0-or-later

name: License Compatibility

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  license-check:
    name: Check License Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install REUSE tool
        run: pip install reuse

      - name: Extract licenses
        run: |
          echo "Checking for AGPL-3.0-or-later compatibility..."
          reuse spdx -o reuse.spdx

      - name: Check AGPL compatibility
        run: |
          # Extract all licenses from the SPDX file
          licenses=$(grep "LicenseInfoInFile" reuse.spdx | cut -d':' -f2 | sort -u | tr -d ' ')

          echo "Found licenses: $licenses"

          # AGPL-3.0-or-later is compatible with:
          # - AGPL-3.0-or-later itself
          # - GPL-3.0-or-later (can be upgraded to AGPL)
          # - LGPL-3.0-or-later (can be upgraded to AGPL)
          # - MIT, BSD, Apache-2.0 (permissive licenses)
          # - CC0-1.0 (public domain)
          # - OFL-1.1 (SIL Open Font License: permits embedding in software/websites;
          #   font files remain under OFL but their use in AGPL projects is allowed)
          # - LicenseRef-TailwindPlus (Catalyst UI Kit: explicitly permits use in open source
          #   projects, components remain under original license but usage is allowed)
          # - LicenseRef-SecPal-Attribution (accepted only for files that declare
          #   the approved SecPal attribution addendum for AGPL-licensed SecPal
          #   repositories; this does not approve arbitrary attribution terms)

          compatible_licenses=(
            "AGPL-3.0-or-later"
            "GPL-3.0-or-later"
            "LGPL-3.0-or-later"
            "MIT"
            "BSD-2-Clause"
            "BSD-3-Clause"
            "Apache-2.0"
            "CC0-1.0"
            "ISC"
            "OFL-1.1"
            "ODbL-1.0"   # Open Database License: accepted for bundled geo-data,
                          # reference datasets, and similar data-only artifacts
                          # (e.g. OpenPLZ); appropriate file-level usage is a
                          # code-review concern - this check only verifies
                          # AGPL compatibility
            "LicenseRef-TailwindPlus"
            "LicenseRef-SecPal-Attribution"
          )

          incompatible_found=0
          for license in $licenses; do
            found=0
            for compatible in "${compatible_licenses[@]}"; do
              if [[ "$license" == "$compatible" ]]; then
                found=1
                break
              fi
            done
            if [ $found -eq 0 ]; then
              echo "ERROR: Incompatible license found: $license"
              incompatible_found=1
            fi
          done

          if [ $incompatible_found -eq 1 ]; then
            echo "ERROR: Found licenses incompatible with AGPL-3.0-or-later"
            exit 1
          fi

          echo "All licenses are compatible with AGPL-3.0-or-later ✓"
