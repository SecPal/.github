---
name: Reusable - Prettier

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "22.x"
      files:
        description: "File patterns to check (space-separated)"
        required: false
        type: string
        default: "**/*.{md,yml,yaml,json}"
      require-lockfile:
        description: >-
          Fail if package-lock.json is missing when package.json exists
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  prettier:
    name: Check Code Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        env:
          REQUIRE_LOCKFILE: ${{ inputs.require-lockfile }}
        run: |
          set -euo pipefail
          if [ -f "package.json" ]; then
            if ! command -v jq >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y jq
            fi
            if [ -f "package-lock.json" ]; then
              npm ci
            elif [ "$REQUIRE_LOCKFILE" = "true" ]; then
              echo "::error::package-lock.json not found. Commit a lock file or disable require-lockfile." >&2
              exit 1
            else
              echo "::warning::No package-lock.json found. Using npm install instead of npm ci." >&2
              echo "::warning::Consider committing package-lock.json for reproducible builds." >&2
              npm install
            fi
          else
            npm install -g prettier
          fi

      - name: Run Prettier Check
        env:
          FILES: ${{ inputs.files }}
        run: |
          # Check if package.json has a format:check script that we can use
          # Only use it if FILES matches the default to avoid ignoring custom file patterns
          if [ -f "package.json" ] && \
            command -v jq &> /dev/null && \
            jq -e '.scripts["format:check"]' package.json > /dev/null 2>&1; then
            if [ "$FILES" = "**/*.{md,yml,yaml,json}" ]; then
              npm run format:check
            else
              echo "Warning: Skipping 'npm run format:check' because FILES ($FILES) doesn't match default pattern."
              echo "Falling back to direct prettier invocation."
              npx prettier --check "$FILES"
            fi
          else
            npx prettier --check "$FILES"
          fi
